<box [style]="{ paddingLeft: 1, paddingRight: 1 }">
  <box [style]="{ height: 8, marginBottom: 1, border: true }">
    <select
      [focused]="true"
      (onChange)="onFontChange($any($event))"
      [options]="options"
      [showScrollIndicator]="true"
      [style]="{ flexGrow: 1 }"
    ></select>
  </box>
  <ascii-font text="ASCII" [font]="font()" />
</box>
