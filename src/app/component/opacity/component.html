<box flexDirection="column" width="100%" height="100%">
  <!-- Header -->
  <box
    [height]="3"
    backgroundColor="#16213e"
    [border]="true"
    borderStyle="single"
    alignItems="center"
    justifyContent="center"
  >
    <text fg="#e94560">
      OPACITY DEMO | 1-4: Toggle opacity | A: {{ animating() ? 'Stop' : 'Animate' }} | Ctrl+C: Exit
    </text>
  </box>

  <!-- Main content -->
  <box [flexGrow]="1" flexDirection="row" [padding]="2">
    <!-- Overlapping boxes -->
    <box [flexGrow]="1" position="relative">
      @for (i of [0, 1, 2, 3]; track i) {
        <box
          [style]="{
            position: 'absolute',
            left: 10 + i * 8,
            top: 2 + i * 2,
            width: 20,
            height: 8,
            backgroundColor: colors[i],
            opacity: opacities()[i],
            border: true,
            borderStyle: 'double',
            borderColor: '#ffffff',
            alignItems: 'center',
            justifyContent: 'center',
            flexDirection: 'column',
          }"
        >
          <text fg="#ffffff">Box {{ i + 1 }}</text>
          <text fg="#ffffff">Opacity: {{ opacities()[i].toFixed(1) }}</text>
        </box>
      }
    </box>

    <!-- Nested opacity demo -->
    <box
      [style]="{
        position: 'absolute',
        right: 5,
        top: 5,
        width: 35,
        height: 10,
        backgroundColor: '#e94560',
        opacity: 0.7,
        border: true,
        borderStyle: 'single',
        padding: 1,
        flexDirection: 'column',
      }"
    >
      <text fg="#ffffff">Parent: 0.7 opacity</text>
      <box
        backgroundColor="#0f3460"
        [opacity]="0.5"
        [border]="true"
        [flexGrow]="1"
        alignItems="center"
        justifyContent="center"
        flexDirection="column"
      >
        <text fg="#ffffff">Child: 0.5 opacity</text>
        <text fg="#ffcc00">Effective: 0.35</text>
      </box>
    </box>
  </box>
</box>
